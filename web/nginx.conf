server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Google Keep Takeout archives can be several MB.
    client_max_body_size 64M;

    # Vite fingerprints everything under /assets/, so it can be cached forever.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # The app shell and the service worker must never be served stale.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }

    # Proxy the API to the FastAPI container.
    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA history fallback — every other path serves index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
